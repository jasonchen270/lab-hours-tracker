services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lab
      POSTGRES_PASSWORD: lab
      POSTGRES_DB: lab_hours
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lab -d lab_hours"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: dev-secret-not-for-production
      DJANGO_DEBUG: "1"
      DJANGO_ALLOWED_HOSTS: "localhost,127.0.0.1,web"
      DATABASE_URL: postgres://lab:lab@db:5432/lab_hours
      TIME_ZONE: America/Los_Angeles
    ports:
      - "8000:8000"
    volumes:
      - .:/app

volumes:
  pgdata:

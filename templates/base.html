<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Lab Hours Tracker{% endblock %}</title>
  <style>
    :root { --fg: #1c1c1e; --muted: #6b7280; --bg: #f9fafb; --card: #fff; --accent: #2563eb; --danger: #dc2626; }
    * { box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; color: var(--fg); background: var(--bg); }
    header { background: var(--card); border-bottom: 1px solid #e5e7eb; padding: 12px 24px; display: flex; justify-content: space-between; align-items: center; }
    header a { color: var(--fg); text-decoration: none; font-weight: 600; }
    header nav a { margin-left: 16px; font-weight: 400; color: var(--muted); }
    main { max-width: 960px; margin: 32px auto; padding: 0 24px; }
    .card { background: var(--card); border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin-bottom: 20px; }
    button, .btn { background: var(--accent); color: #fff; border: 0; padding: 10px 16px; border-radius: 6px; font-size: 14px; cursor: pointer; text-decoration: none; display: inline-block; }
    button.danger, .btn.danger { background: var(--danger); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid #f3f4f6; }
    .muted { color: var(--muted); font-size: 13px; }
    input[type=text], input[type=password] { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
    label { display: block; margin: 8px 0 4px; font-size: 13px; color: var(--muted); }
    .row { display: flex; gap: 16px; flex-wrap: wrap; }
    .row > .card { flex: 1; min-width: 240px; }
    .big { font-size: 32px; font-weight: 700; }
    .errorlist { color: var(--danger); font-size: 13px; padding-left: 18px; }
  </style>
</head>
<body>
<header>
  <a href="{% url 'dashboard' %}">Lab Hours Tracker</a>
  <nav>
    {% if user.is_authenticated %}
      <span class="muted">{{ user.username }}</span>
      <a href="{% url 'export_csv' %}">Export CSV</a>
      <form action="{% url 'logout' %}" method="post" style="display:inline">{% csrf_token %}<button type="submit" style="background:none;color:var(--muted);padding:0;font:inherit;cursor:pointer">Log out</button></form>
    {% else %}
      <a href="{% url 'login' %}">Log in</a>
      <a href="{% url 'signup' %}">Sign up</a>
    {% endif %}
  </nav>
</header>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
